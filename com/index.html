<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>COM</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/style.css" />

  <!--
    API BASE URL — set content="" to point the client at a specific backend.
    Resolution order: window.COM_API_BASE > this meta tag > same-origin.
    For local dev leave content empty (same-origin). For GitHub Pages deployments
    set it to the Tailscale or public API URL, e.g.:
      <meta name="com-api-base" content="https://com.degeofroy.com">
  -->
  <meta name="com-api-base" content="https://houston.tail81fce0.ts.net:8443" />

  <!--
    SAME-ORIGIN CRYPTO — all crypto libs are served from this origin (web/vendor/).
    NO third-party CDN. The importmap below wires bare specifiers to local vendor files.

    SRI hashes for each vendored file are recorded in web/vendor/INTEGRITY.txt.
    Browsers do not yet support importmap-level integrity in the "integrity" field
    across all engines; the same-origin constraint already prevents CDN injection.
    Pin the vendored files in git and verify hashes via vendor/INTEGRITY.txt on deploy.
  -->
  <script type="importmap">
  {
    "imports": {
      "libsodium-wrappers": "./vendor/libsodium-wrappers.mjs",
      "libsodium":          "./vendor/libsodium.mjs",
      "@cloudflare/opaque-ts": "./vendor/@cloudflare/opaque-ts/lib/src/index.js",
      "@cloudflare/voprf-ts":  "./vendor/@cloudflare/voprf-ts/lib/src/index.js",
      "@noble/hashes/lib/scrypt": "./vendor/@noble/hashes/esm/scrypt.js",
      "@noble/hashes/lib/crypto": "./vendor/@noble/hashes/esm/cryptoBrowser.js"
    }
  }
  </script>
</head>
<body>
  <header class="topbar">
    <button id="backBtn" class="iconbtn back" type="button" aria-label="Back to conversations" hidden>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
        <path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <img class="brand" src="./com-logo.png" alt="COM" />
    <span id="who" class="who" hidden></span>
    <button id="logoutBtn" class="ghost" hidden>Logout</button>
  </header>

  <!-- LOGIN VIEW -->
  <section id="loginView" class="view login">
    <form id="loginForm" autocomplete="off">
      <!-- DECOY honeypot, on top per request. Legit users leave it EMPTY. Any value -> reject + admin alert. -->
      <label class="field">
        <span>Username</span>
        <input id="username" type="text" name="username" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" />
      </label>

      <label class="field">
        <span>Password</span>
        <input id="passphrase" type="password" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" required />
      </label>
      <label class="show-pw"><input id="showPw" type="checkbox" /> <span>Show password</span></label>

      <button id="loginBtn" type="submit">Sign in</button>
      <p id="loginError" class="error" role="alert"></p>
    </form>
  </section>

  <!-- CHAT VIEW -->
  <section id="chatView" class="view chat" hidden>
    <aside class="sidebar" aria-label="Sidebar">
      <div id="convList" class="convs" aria-label="Conversations"></div>

      <!-- Direct chats start by tapping a person in the list above; no separate
           picker needed. -->

      <!-- NEW ROOM panel (ALL users). Name a room + pick members -> create it. -->
      <details id="roomPanel" class="panel">
        <summary>New room</summary>
        <div class="panel-body">
          <form id="createRoomForm" class="stack" autocomplete="off">
            <input id="roomTitle" type="text" placeholder="room name (e.g. Weekend Trip)" required />
            <div id="roomMembers" class="checks" aria-label="People to invite"></div>
            <button type="submit">Create room</button>
          </form>
          <p id="roomMsg" class="panel-note" role="status"></p>
        </div>
      </details>

      <!-- ADMIN PANEL (only shown when is_admin). -->
      <details id="adminPanel" class="panel admin" hidden>
        <summary>Admin</summary>
        <div class="panel-body">
          <h3>People</h3>
          <ul id="userList" class="user-list"></ul>

          <h3>Add a person</h3>
          <form id="createUserForm" class="stack" autocomplete="off">
            <input id="newNick" type="text" placeholder="nickname (e.g. ann)" required />
            <input id="newDisplay" type="text" placeholder="display name (e.g. Ann)" required />
            <button type="submit">Create user</button>
          </form>

          <h3>Grant pending members</h3>
          <p class="hint">Once an unregistered member registers, grant them the group key here.</p>
          <ul id="pendingList" class="pending-list"></ul>

          <p id="adminMsg" class="panel-note" role="status"></p>
        </div>
      </details>
    </aside>
    <main class="thread">
      <!-- Per-room "Add people" affordance — shown to ANY member of the active room. -->
      <details id="addPeoplePanel" class="panel room-add" hidden>
        <summary>Add people</summary>
        <div class="panel-body">
          <div id="addPeopleList" class="checks" aria-label="People to add"></div>
          <p id="addPeopleMsg" class="panel-note" role="status"></p>
        </div>
      </details>
      <!-- Call bar — shown only when a 1-to-1 direct conversation is active. -->
      <div id="callBar" class="call-bar" hidden>
        <button id="callBtn" class="call-btn" type="button" aria-label="Start a voice call">
          <span aria-hidden="true">☎</span> Call
        </button>
      </div>
      <!-- Delete room — shown to any member of the active conversation. -->
      <div id="deleteRoomBar" class="delete-room-bar" hidden>
        <button id="deleteRoomBtn" class="delete-room-btn" type="button">Delete room</button>
      </div>
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="composer" class="composer">
        <label class="attach">
          <input id="fileInput" type="file" hidden />
          <span aria-hidden="true">+</span>
        </label>
        <input id="msgInput" type="text" placeholder="Message" autocomplete="off" />
        <button id="talkBtn" class="talk" type="button" aria-label="Hold to record a voice message">Talk</button>
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </main>

    <!-- Incoming call overlay -->
    <div id="incomingCall" class="call-overlay" hidden>
      <div class="call-card">
        <p class="call-status">Incoming call</p>
        <p id="incomingName" class="call-name">Someone</p>
        <div class="call-actions">
          <button id="callDeclineBtn" class="call-decline" type="button">Decline</button>
          <button id="callAcceptBtn" class="call-accept" type="button">Accept</button>
        </div>
      </div>
    </div>

    <!-- Active / outgoing call bar -->
    <div id="inCallBar" class="in-call" hidden>
      <span id="inCallName" class="in-call-name">Call</span>
      <span id="inCallStatus" class="in-call-status">Calling…</span>
      <span class="in-call-spacer"></span>
      <button id="callMuteBtn" class="in-call-btn" type="button">Mute</button>
      <button id="callHangupBtn" class="in-call-btn danger" type="button">Hang up</button>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
  </section>

  <script type="module" src="./js/app.js"></script>
  <script>
    // Register the service worker for installable PWA (caches ONLY the static shell).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
